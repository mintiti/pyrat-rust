name: Bug Report
description: Something isn't working right
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: How to reproduce
      description: Minimal steps or commands to trigger the bug.
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit hash, branch, or release.
    validations:
      required: false
