name: Lint

on:
  workflow_call:

jobs:
  lint:
    name: Lint All Components
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          engine/pyproject.toml

    - name: Sync workspace dependencies
      run: uv sync --all-extras

    - name: Check Engine Python formatting
      run: uv run --directory engine ruff check python/

    - name: Type check Engine Python
      run: uv run --directory engine mypy python/pyrat_engine --ignore-missing-imports

    - name: Check SDK Python formatting
      run: uv run --directory sdk-python ruff check pyrat_sdk

    - name: Type check SDK Python
      run: uv run --directory sdk-python mypy pyrat_sdk --ignore-missing-imports
