repos:
  # Generic checks
  -   repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.5.0
      hooks:
        -   id: trailing-whitespace
        -   id: end-of-file-fixer
        -   id: check-yaml
        -   id: check-toml
        -   id: check-added-large-files
        -   id: debug-statements

  # Python linting/formatting
  -   repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.7.3
      hooks:
        -   id: ruff
            args: [--fix]
            types_or: [python, pyi]
            files: ^(engine/python/|sdk/python/)
        -   id: ruff-format
            types_or: [python, pyi]
            files: ^(engine/python/|sdk/python/)

  # Python type checking - run same as CI for consistency
  -   repo: local
      hooks:
        -   id: mypy-engine
            name: mypy engine
            description: Type check engine package (matches CI)
            entry: uv run --directory engine mypy python/pyrat_engine --ignore-missing-imports
            language: system
            pass_filenames: false
            files: ^engine/python/
            types: [python]

        -   id: mypy-sdk-python
            name: mypy SDK Python
            description: Type check SDK Python package (matches CI)
            entry: uv run --directory sdk/python mypy pyrat_sdk --ignore-missing-imports
            language: system
            pass_filenames: false
            files: ^sdk/python/
            types: [python]

  # Rust checks
  -   repo: local
      hooks:
        -   id: fmt
            name: cargo fmt
            description: Format Rust code
            entry: bash -c 'cargo fmt --all'
            language: system
            types: [rust]
            pass_filenames: false

        -   id: clippy
            name: cargo clippy
            description: Lint Rust code
            entry: bash -c 'cargo clippy --all-targets --all-features -- -D warnings -A non-local-definitions'
            language: system
            types: [rust]
            pass_filenames: false

  # GUI frontend checks
  -   repo: local
      hooks:
        -   id: biome-gui
            name: biome check gui
            description: Lint and format GUI frontend code
            entry: pnpm --dir gui exec biome check --write
            language: system
            pass_filenames: false
            files: ^gui/src/
            types_or: [ts, tsx, json]

        -   id: tsc-gui
            name: tsc gui
            description: Type check GUI frontend code
            entry: pnpm --dir gui exec tsc --noEmit
            language: system
            pass_filenames: false
            files: ^gui/(src/|tsconfig\.json)

  # Tests
  -   repo: local
      hooks:
        -   id: pytest-engine
            name: pytest engine
            entry: uv run --directory engine pytest python/tests
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]  # Only run on push, not on every commit

        -   id: pytest-sdk-python
            name: pytest SDK Python
            entry: uv run --directory sdk/python pytest tests
            language: system
            pass_filenames: false
            always_run: true
            stages: [pre-push]  # Only run on push, not on every commit
